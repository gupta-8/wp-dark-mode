<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.8"/>

  <!-- Stars -->
  <g filter="url(#star-glow)" opacity="0.7">
    <circle cx="120" cy="130" r="3" fill="#e0e7ff"/>
    <circle cx="95" cy="200" r="2" fill="#c7d2fe"/>
    <circle cx="140" cy="310" r="2.5" fill="#e0e7ff"/>
    <circle cx="110" cy="370" r="2" fill="#c7d2fe"/>
    <circle cx="170" cy="120" r="2" fill="#a5b4fc"/>
    <circle cx="130" cy="260" r="1.8" fill="#e0e7ff"/>
    <circle cx="100" cy="160" r="1.5" fill="#c7d2fe"/>
    <circle cx="160" cy="380" r="2.2" fill="#e0e7ff"/>
    <circle cx="85" cy="290" r="1.5" fill="#a5b4fc"/>
  </g>

  <!-- Moon crescent -->
  <g filter="url(#glow)">
    <circle cx="280" cy="220" r="110" fill="url(#moon)"/>
    <circle cx="330" cy="175" r="90" fill="url(#bg)"/>
  </g>

  <!-- Sun half — bottom right -->
  <g filter="url(#glow)">
    <circle cx="310" cy="340" r="44" fill="url(#sun)"/>

    <!-- Sun rays -->
    <g stroke="url(#sun)" stroke-width="5" stroke-linecap="round" opacity="0.9">
      <line x1="310" y1="282" x2="310" y2="268"/>
      <line x1="310" y1="398" x2="310" y2="412"/>
      <line x1="252" y1="340" x2="238" y2="340"/>
      <line x1="368" y1="340" x2="382" y2="340"/>
      <line x1="269" y1="299" x2="259" y2="289"/>
      <line x1="351" y1="381" x2="361" y2="391"/>
      <line x1="351" y1="299" x2="361" y2="289"/>
      <line x1="269" y1="381" x2="259" y2="391"/>
    </g>
  </g>

  <!-- Dividing line — diagonal sweep -->
  <line x1="170" y1="420" x2="400" y2="110" stroke="#6366f1" stroke-width="3" opacity="0.3" stroke-linecap="round"/>

  <!-- Toggle pill shape at bottom center -->
  <g transform="translate(196, 432)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#312e81" opacity="0.9"/>
    <circle cx="96" cy="20" r="15" fill="#a5b4fc"/>
    <circle cx="30" cy="20" r="8" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
